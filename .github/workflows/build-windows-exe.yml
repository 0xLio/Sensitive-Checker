name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependency
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --name csv-sensitive-checker check_sensitive_accounts.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: csv-sensitive-checker-windows
          path: dist/csv-sensitive-checker.exe
